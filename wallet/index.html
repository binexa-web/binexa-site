<!DOCTYPE html>
<html>

<head>
    <title>My Wallet</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

    <h2>💰 My Wallet</h2>

    <h3>Total Earnings: ₹<span id="total">0</span></h3>

    <table>
        <thead>
            <tr>
                <th>From User</th>
                <th>Level</th>
                <th>Amount (₹)</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="earningsTable">
        </tbody>
    </table>

    <script src="wallet.js"></script>
</body>

</html>

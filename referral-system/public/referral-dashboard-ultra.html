<!DOCTYPE html>
<html>

<head>
    <title>BINEXA ULTRA MAX</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(120deg, #020617, #020617, #020617, #0f172a);
            color: #fff;
            animation: bgmove 12s infinite linear;
        }

        @keyframes bgmove {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 400px 0;
            }
        }

        .layout {
            display: flex;
        }

        .sidebar {
            width: 240px;
            background: #020617;
            height: 100vh;
            padding: 25px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .main {
            flex: 1;
            padding: 30px;
        }

        .grid {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            flex: 1;
            background: rgba(15, 23, 42, 0.8);
            padding: 22px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
        }

        .rank {
            font-size: 18px;
            color: #22d3ee;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        td,
        th {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        th {
            color: #22d3ee;
        }

        button {
            background: #22d3ee;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="layout">

        <div class="sidebar">
            <h3>BINEXA ULTRA MAX</h3>
            <p id="rankBox">Rank: Loading...</p>
        </div>

        <div class="main">

            <h2>🚀 Ultra Max Dashboard</h2>

            <div class="grid">

                <div class="card">
                    <h4>Total Referrals</h4>
                    <p id="totalRef">0</p>
                </div>

                <div class="card">
                    <h4>Total Earnings</h4>
                    <p id="totalEarn">₹0</p>
                </div>

                <div class="card">
                    <h4>Your Rank</h4>
                    <p class="rank" id="rank">Starter</p>
                </div>

            </div>

            <h3>💰 Level Commission</h3>

            <table>
                <thead>
                    <tr>
                        <th>Level</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="levelTable"></tbody>
            </table>

            <button onclick="loadUltra()">Refresh</button>

        </div>
    </div>

    <script>

        const userId = 1;

        function loadUltra() {

            fetch(`/user/dashboard/${userId}`)
                .then(res => res.json())
                .then(data => {

                    document.getElementById("totalRef").innerText = data.totalRef;
                    document.getElementById("totalEarn").innerText = "₹" + data.totalEarn;

                    const levelTable = document.getElementById("levelTable");
                    levelTable.innerHTML = "";

                    data.levelIncome.forEach(l => {
                        levelTable.innerHTML += `
<tr>
<td>L${l.level}</td>
<td>₹${l.total}</td>
</tr>
`;
                    });

                });

            fetch(`/user/rank/${userId}`)
                .then(r => r.json())
                .then(d => {
                    document.getElementById("rank").innerText = d.rank;
                    document.getElementById("rankBox").innerText = "Rank: " + d.rank;
                });

        }

        loadUltra();

    </script>

</body>

</html>

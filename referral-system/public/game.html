<!DOCTYPE html>
<html>

<head>
    <title>Tap Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: #fff;
        }

        h1 {
            color: #00ffcc;
        }

        #score {
            font-size: 40px;
            margin: 20px;
        }

        button {
            font-size: 24px;
            padding: 20px 40px;
            border: none;
            border-radius: 10px;
            background: #00ffcc;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
        }

        #timer {
            font-size: 22px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>🎮 Tap & Score Game</h1>

    <div id="timer">Time: 30</div>
    <div id="score">Score: 0</div>

    <button id="tapBtn">TAP</button>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameOver = false;

        const scoreDiv = document.getElementById("score");
        const timerDiv = document.getElementById("timer");
        const tapBtn = document.getElementById("tapBtn");

        tapBtn.onclick = () => {
            if (gameOver) return;
            score++;
            scoreDiv.innerText = "Score: " + score;
        };

        const timer = setInterval(() => {
            timeLeft--;
            timerDiv.innerText = "Time: " + timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                gameOver = true;
                tapBtn.disabled = true;
                alert("Game Over!\nYour Score: " + score);
            }
        }, 1000);
    </script>

</body>

</html>

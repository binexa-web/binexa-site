<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Block Mining</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            width: 380px;
            border-radius: 14px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .stats div {
            text-align: left;
            font-size: 14px;
        }

        .block {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }

        #startBtn {
            background: #1abc9c;
            color: #000;
        }

        #claimBtn {
            background: #3498db;
            color: #000;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.7;
        }


        /* ===== GAME FEEL ANIMATIONS ===== */

        .card {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Mining block pulse */
        #currentBlock {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 10px #00ffd5;
            }

            50% {
                box-shadow: 0 0 25px #00ffd5;
            }

            100% {
                box-shadow: 0 0 10px #00ffd5;
            }
        }

        /* Button hover like game */
        button {
            transition: all 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 213, 0.7);
        }

        /* ===== BLOCK RARITY COLORS ===== */
        .block-common {
            border: 2px solid #00ff9d;
            box-shadow: 0 0 12px rgba(0, 255, 157, 0.7);
            color: #00ff9d;
        }

        .block-rare {
            border: 2px solid #4dabff;
            box-shadow: 0 0 16px rgba(77, 171, 255, 0.8);
            color: #4dabff;
        }

        .block-epic {
            border: 2px solid #c77dff;
            box-shadow: 0 0 22px rgba(199, 125, 255, 0.9);
            color: #c77dff;
        }

        .block-legendary {
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 1);
            color: #ffd700;
        }
    </style>

</head>

<body>

    <div class="card">
        <h1>⛏ Block Mining</h1>

        <div class="stats">
            <div>
                <div>Plan</div>
                <strong id="plan">Loading...</strong>
            </div>
            <div>
                <div>Blocks Today</div>
                <strong id="blocksToday">0</strong>
            </div>
            <div>
                <div>Total Points</div>
                <strong id="totalPoints">0</strong>
            </div>
        </div>

        <div class="block">
            <div>Current Block</div>
            <h2 id="currentBlock">---</h2>
        </div>

        <div style="background:#222;height:10px;border-radius:5px;margin:15px 0;">
            <div id="progress" style="height:10px;width:0%;background:#00ffd5;border-radius:5px;">
            </div>
        </div>

        <button id="startBtn">▶ Start Mining</button>
        <button id="claimBtn" disabled>💎 Claim Block</button>

        <div class="footer">
            Powered by Binexa Mining Engine
        </div>
    </div>

    <script>
        let userId = 1;
        let timer = null;
        let progress = 0;

        function loadStatus() {
            fetch(`http://localhost:3000/mining/status/${userId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("blocksToday").innerText = data.blocks_mined;
                    document.getElementById("totalPoints").innerText = data.total_points;
                });
        }

        function startMining() {
            progress = 0;
            document.getElementById("progress").style.width = "0%";
            document.getElementById("currentBlock").innerText = "Mining...";

            timer = setInterval(() => {
                progress += 10;
                document.getElementById("progress").style.width = progress + "%";
                if (progress >= 100) {
                    clearInterval(timer);
                    document.getElementById("currentBlock").innerText = "Block Ready";
                    document.getElementById("claimBtn").disabled = false;
                }
            }, 500);
        }

        function claimBlock() {
            fetch("http://localhost:3000/mining/start", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userId })
            })
                .then(() => {
                    loadStatus();
                    document.getElementById("currentBlock").innerText = "---";
                    document.getElementById("claimBtn").disabled = true;
                });
        }

        document.getElementById("startBtn").onclick = startMining;
        document.getElementById("claimBtn").onclick = claimBlock;

        loadStatus();
    </script>



</body>

</html>

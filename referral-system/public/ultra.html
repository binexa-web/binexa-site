<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BINEXA ULTRA MAX</title>

    <link rel="stylesheet" href="ultra.css">

</head>

<body>

    <div class="ultra-layout">

        <!-- SIDEBAR -->
        <div class="ultra-sidebar">
            <h2>🚀 BINEXA ULTRA MAX</h2>

            <a href="#">🏠 Overview</a>
            <a href="mining.html">⛏ Mining</a>
            <a href="game.html">🎮 Gaming</a>
            <a href="#" onclick="openReferral()">👥 Referrals</a>
            <a href="#">💰 Earnings</a>
            <a href="#">📊 Trading Stats</a>
        </div>


        <!-- MAIN -->
        <div class="ultra-main">

            <h1>Ultra Max Dashboard</h1>

            <div class="card">
                <h3>🌳 My Referral Tree</h3>

                <div id="graphTree"></div>

                <div id="treeWrapper">
                    <div id="treeView" class="mlm-tree"></div>
                </div>

                <div class="ultra-cards">

                    <div class="u-card">
                        <h4>Total Referrals</h4>
                        <p id="uTotalUsers">0</p>
                    </div>

                    <div class="u-card">
                        <h4>Total Earnings</h4>
                        <p id="uTotalEarn">₹0</p>
                    </div>

                    <div class="u-card">
                        <h4>Mining Power</h4>
                        <p id="power">Starter</p>
                    </div>

                    <div class="u-card">
                        <h4>Rank</h4>
                        <p id="rank">Starter</p>
                    </div>

                </div>

                <div class="u-table">
                    <h3>💰 Referral Level Commission</h3>

                    <table>
                        <thead>
                            <tr>
                                <th>Level</th>
                                <th>Commission %</th>
                                <th>Total Earned</th>
                            </tr>
                        </thead>

                        <tbody id="levelTable">
                        </tbody>
                    </table>

                </div>

            </div>
        </div>


        <script src="ultra.js"></script>

</body>

</html>

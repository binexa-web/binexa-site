<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        .box {
            width: 300px;
            margin: 100px auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #22c55e;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>🔐 Admin Login</h2>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="msg"></p>
    </div>

    <script>
        function login() {
            fetch("/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: username.value,
                    password: password.value
                })
            })
                .then(r => r.json())
                .then(d => {
                    if (d.success) {
                        localStorage.setItem("admin", d.admin_id);
                        window.location.href = "/admin/admin-dashboard.html";
                    } else {
                        msg.innerText = "❌ Invalid login";
                    }
                });
        }
    </script>

</body>

</html>

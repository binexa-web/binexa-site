<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gaming Subscription</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: Arial, sans-serif;
            color: #fff;
            margin: 0;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .plans {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .plan {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s;
        }

        .plan:hover {
            transform: translateY(-8px);
        }

        .plan h2 {
            margin: 0;
            font-size: 22px;
        }

        .price {
            font-size: 26px;
            margin: 15px 0;
            color: #00ffd5;
        }

        .features {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.9;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: #00ffd5;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00c9aa;
        }
    </style>
</head>

<body>

    <h1>🚀 Gaming Mining Subscriptions</h1>

    <div class="plans">

        <div class="plan">
            <h2>BASIC</h2>
            <div class="price">FREE</div>
            <div class="features">
                ✔ 3 Blocks / Day<br>
                ✔ Common Blocks<br>
                ❌ Low Rewards
            </div>
            <button onclick="selectPlan('BASIC')">Start Free</button>
        </div>

        <div class="plan">
            <h2>SILVER</h2>
            <div class="price">₹199 / Month</div>
            <div class="features">
                ✔ 7 Blocks / Day<br>
                ✔ Common + Rare<br>
                ✔ Better Points
            </div>
            <button onclick="selectPlan('SILVER')">Upgrade</button>
        </div>

        <div class="plan">
            <h2>GOLD</h2>
            <div class="price">₹499 / Month</div>
            <div class="features">
                ✔ 10 Blocks / Day<br>
                ✔ Rare + Epic<br>
                ✔ High Rewards
            </div>
            <button onclick="selectPlan('GOLD')">Go Gold</button>
        </div>

        <div class="plan">
            <h2>PRO</h2>
            <div class="price">₹999 / Month</div>
            <div class="features">
                ✔ 15 Blocks / Day<br>
                ✔ Epic + Legendary<br>
                ✔ Max Rewards
            </div>
            <button onclick="selectPlan('PRO')">Go Pro</button>
        </div>

    </div>

    <script>
        const userId = 1; // abhi hardcoded

        function selectPlan(plan) {
            fetch("http://localhost:3000/subscribe", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userId, plan })
            })
                .then(res => res.json())
                .then(() => {
                    alert(plan + " plan activated!");
                    window.location.href = "/mining.html";
                })
                .catch(err => {
                    alert("Subscription error");
                    console.error(err);
                });
        }
    </script>

</body>

</html>

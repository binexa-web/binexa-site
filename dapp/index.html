<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINEXA ($BNX) Private Sale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            width: 95%;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h2 {
            color: #f59e0b;
            margin-bottom: 5px;
        }

        .stats {
            background: #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* Button Styles with Hover Effect */
        button {
            background: #f59e0b;
            color: black;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover {
            background: #fbbf24;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
        }

        /* Input Field Style */
        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            width: 85%;
            margin-bottom: 15px;
            background: #0f172a;
            color: white;
            text-align: center;
            font-size: 1rem;
        }

        /* Referral Section Style */
        #refContainer {
            margin-top: 20px;
            padding: 12px;
            border: 1px dashed #10b981;
            border-radius: 10px;
            background: #0b1120;
            display: none;
        }

        #refLinkDisplay {
            font-size: 0.7rem;
            word-break: break-all;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        #copyBtn {
            padding: 8px;
            font-size: 0.8rem;
            background: #10b981;
            width: auto;
            color: white;
        }

        #copyBtn:hover {
            background: #059669;
        }

        #status {
            margin-top: 15px;
            color: #94a3b8;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>BINEXA ($BNX)</h2>
        <p>Private Sale is Live</p>
        <div class="stats">
            Price: 1 BNB = 200,000 BNX<br>
            Min Buy: 0.1 BNB
        </div>

        <button id="connectBtn">Connect Wallet</button>

        <div id="buySection" style="display:none; margin-top: 20px;">
            <input type="number" id="bnbAmount" placeholder="Amount in BNB (Min 0.1)" step="0.1" min="0.1">
            <button id="buyBtn">Buy BNX Now</button>

            <div id="refContainer">
                <p style="color: #10b981; font-size: 0.8rem; margin: 0 0 5px 0;"><b>Your Referral Link (10% Bonus)</b>
                </p>
                <div id="refLinkDisplay"></div>
                <button id="copyBtn">Copy Link</button>
            </div>
        </div>

        <p id="status"></p>
    </div>

    <script>
        // Aapka deployed contract address
        const contractAddress = "0x9300F0A378B60Dc4fcBcB224C78A6B4720f456B6";
        const abi = ["function buyTokens(address _referrer) public payable"];

        let signer, contract;

        async function connect() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = provider.getSigner();
                    const address = await signer.getAddress();

                    // UI Updates after connection
                    document.getElementById("connectBtn").innerText = "Wallet: " + address.substring(0, 6) + "..." + address.substring(38);
                    document.getElementById("buySection").style.display = "block";
                    document.getElementById("status").innerText = "Connected to BSC!";

                    // Referral Link Logic
                    const refLink = window.location.origin + window.location.pathname + "?ref=" + address;
                    document.getElementById("refContainer").style.display = "block";
                    document.getElementById("refLinkDisplay").innerText = refLink;

                    // Copy Button Logic
                    document.getElementById("copyBtn").onclick = () => {
                        navigator.clipboard.writeText(refLink).then(() => {
                            document.getElementById("copyBtn").innerText = "Copied!";
                            setTimeout(() => { document.getElementById("copyBtn").innerText = "Copy Link"; }, 2000);
                        });
                    };

                    contract = new ethers.Contract(contractAddress, abi, signer);
                } catch (err) {
                    document.getElementById("status").innerText = "Connection Failed!";
                }
            } else {
                alert("Please open in Trust or Metamast or any other Web3 browser ");
            }
        }

        async function buy() {
            const amount = document.getElementById("bnbAmount").value;
            if (amount < 0.1) return alert("Minimum purchase is 0.1 BNB");

            // URL se referrer nikalna
            const urlParams = new URLSearchParams(window.location.search);
            let referrer = urlParams.get('ref');

            if (!referrer || !ethers.utils.isAddress(referrer)) {
                referrer = "0x0000000000000000000000000000000000000000";
            }

            try {
                document.getElementById("status").innerText = "Confirming in Wallet...";
                const tx = await contract.buyTokens(referrer, {
                    value: ethers.utils.parseEther(amount)
                });
                document.getElementById("status").innerText = "Transaction Sent! Waiting for block...";
                await tx.wait();
                alert("Congratulations! BNX Tokens Purchased.");
                document.getElementById("status").innerText = "Transaction Successful!";
            } catch (err) {
                console.error(err);
                alert("Transaction Failed! Check your BNB balance.");
                document.getElementById("status").innerText = "Error!";
            }
        }

        document.getElementById("connectBtn").onclick = connect;
        document.getElementById("buyBtn").onclick = buy;
    </script>
</body>

</html>

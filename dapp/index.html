<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINEXA ($BNX) Private Sale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h2 {
            color: #f59e0b;
            margin-bottom: 10px;
        }

        .stats {
            background: #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        button {
            background: #f59e0b;
            color: black;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            width: 85%;
            margin-bottom: 15px;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        #refLinkDisplay {
            margin-top: 15px;
            padding: 10px;
            border: 1px dashed #10b981;
            color: #10b981;
            font-size: 0.75rem;
            word-break: break-all;
            display: none;
        }

        #status {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        button {
            background: #f59e0b;
            color: black;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            /* Cursor pointer dikhane ke liye */
            width: 100%;
            font-size: 1rem;
            transition: 0.3s;
            /* Smooth highlight ke liye */
        }

        /* Button par cursor aane par ye rang hoga */
        button:hover {
            background: #fbbf24;
            /* Thoda light yellow/orange highlight */
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.6);
            /* Glow effect */
            transform: translateY(-2px);
            /* Button thoda upar uthega */
        }

        /* Button dabane par effect */
        button:active {
            transform: translateY(0px);
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>BINEXA ($BNX)</h2>
        <p>Private Sale is Live</p>
        <div class="stats">
            Price: 1 BNB = 200,000 BNX<br>
            Min Buy: 0.1 BNB
        </div>

        <button id="connectBtn">Connect Wallet</button>

        <div id="buySection" style="display:none; margin-top: 20px;">
            <input type="number" id="bnbAmount" placeholder="Amount in BNB" step="0.1" min="0.1">
            <button id="buyBtn">Buy BNX Now</button>
            <div id="refLinkDisplay"></div>
        </div>
        <p id="status"></p>
    </div>

    <script>
        // Aapka deployed contract address
        const contractAddress = "0x9300F0A378B60Dc4fcBcB224C78A6B4720f456B6";
        const abi = ["function buyTokens(address _referrer) public payable"];

        let signer, contract;

        async function connect() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = provider.getSigner();
                    const address = await signer.getAddress();

                    document.getElementById("connectBtn").innerText = "Wallet: " + address.substring(0, 6) + "...";
                    document.getElementById("buySection").style.display = "block";
                    document.getElementById("status").innerText = "Connected to BSC!";

                    // Referral Link Generate Karein
                    const refLink = window.location.origin + window.location.pathname + "?ref=" + address;
                    document.getElementById("refLinkDisplay").style.display = "block";
                    document.getElementById("refLinkDisplay").innerHTML = "<b>Your Referral Link (10% Bonus):</b><br>" + refLink;

                    contract = new ethers.Contract(contractAddress, abi, signer);
                } catch (err) {
                    document.getElementById("status").innerText = "Connection Failed!";
                }
            } else {
                alert("Please use Web3 Browser!");
            }
        }

        async function buy() {
            const amount = document.getElementById("bnbAmount").value;
            if (amount < 0.1) return alert("Min buy is 0.1 BNB");

            const urlParams = new URLSearchParams(window.location.search);
            let referrer = urlParams.get('ref') || "0x0000000000000000000000000000000000000000";

            try {
                document.getElementById("status").innerText = "Check MetaMask to Confirm...";
                const tx = await contract.buyTokens(referrer, {
                    value: ethers.utils.parseEther(amount)
                });
                document.getElementById("status").innerText = "Transaction Sent...";
                await tx.wait();
                alert("Success! BNX Bought.");
                document.getElementById("status").innerText = "Transaction Confirmed!";
            } catch (err) {
                alert("Error: Check BNB balance or Gas.");
                document.getElementById("status").innerText = "Error!";
            }
        }

        document.getElementById("connectBtn").onclick = connect;
        document.getElementById("buyBtn").onclick = buy;
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINEXA ($BNX) Private Sale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            max-width: 420px;
            width: 95%;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h2 {
            color: #f59e0b;
            margin-bottom: 5px;
        }

        .stats {
            background: #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        button {
            background: #f59e0b;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        button:hover {
            background: #fbbf24;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            width: 85%;
            margin-bottom: 15px;
            background: #0f172a;
            color: white;
            text-align: center;
            font-size: 1rem;
        }

        .token-info {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #475569;
        }

        .token-addr {
            font-size: 0.7rem;
            color: #94a3b8;
            word-break: break-all;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .small-copy {
            background: #475569;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.7rem;
            width: auto;
            cursor: pointer;
        }

        #refContainer {
            margin-top: 15px;
            padding: 12px;
            border: 1px dashed #10b981;
            border-radius: 10px;
            background: #0b1120;
            display: none;
        }

        #refLinkDisplay {
            font-size: 0.7rem;
            word-break: break-all;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        #copyBtn {
            padding: 8px;
            font-size: 0.8rem;
            background: #10b981;
            width: auto;
            color: white;
            margin: 0;
        }

        #status {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>BINEXA ($BNX)</h2>
        <p>Private Sale is Live</p>
        <div class="stats">
            Price: 1 BNB = 300,000 BNX<br>
            Min Buy: 0.05 BNB
        </div>

        <button id="connectBtn">Connect Wallet</button>

        <div id="buySection" style="display:none;">
            <input type="number" id="bnbAmount" placeholder="Amount (Min 0.05 BNB)" step="0.05" min="0.05">
            <button id="buyBtn">Buy BNX Now</button>

            <div class="token-info">
                <button id="importBtn" style="margin-bottom: 10px;">Add $BNX to your Wallet</button>
                <div style="font-size: 0.8rem; color: #f59e0b;"><b>Contract Address:</b></div>
                <div id="tokenAddrText" class="token-addr">0xD7fAcAa159646183E1100A8385fe2403072cE63b</div>
                <button id="copyTokenAddr" class="small-copy">Copy Address</button>
            </div>

            <div id="refContainer">
                <p style="color: #10b981; font-size: 0.8rem; margin: 0 0 5px 0;"><b>Your Referral Link (10% Bonus)</b>
                </p>
                <div id="refLinkDisplay"></div>
                <button id="copyBtn">Copy Link</button>
            </div>
        </div>

        <div
            style="margin-top: 20px; padding: 15px; border: 1px dashed #f59e0b; border-radius: 10px; background: rgba(245, 158, 11, 0.05);">
            <h4 style="color: #f59e0b; margin: 0 0 10px 0; font-size: 0.9rem;">🚀 Future Roadmap</h4>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="color: #fff; font-size: 0.8rem;">Staking Rewards</span>
                <span
                    style="background: #f59e0b; color: #000; padding: 2px 8px; border-radius: 12px; font-size: 0.6rem; font-weight: bold;">COMING
                    SOON</span>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="color: #fff; font-size: 0.8rem;">Auto-Compounding</span>
                <span
                    style="background: #f59e0b; color: #000; padding: 2px 8px; border-radius: 12px; font-size: 0.6rem; font-weight: bold;">COMING
                    SOON</span>
            </div>
        </div>

        <p id="status"></p>
    </div>

    <script>
        // Configuration
        const saleAddress = "0x19341d2de48C5887fa6531BF0875EdFA40f438ff";
        const tokenAddress = "0xD7fAcAa159646183E1100A8385fe2403072cE63b";
        const abi = ["function buyTokens(address _referrer) public payable"];

        let signer, contract;

        // Helper to format address: 0x1234...abcd
        function formatAddress(addr) {
            return addr.substring(0, 6) + "..." + addr.substring(addr.length - 4);
        }

        async function connect() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = provider.getSigner();
                    const address = await signer.getAddress();

                    // Update button with short address
                    document.getElementById("connectBtn").innerText = "Connected: " + formatAddress(address);
                    document.getElementById("buySection").style.display = "block";
                    document.getElementById("status").innerText = "Connected to BSC!";

                    // Referral Link Logic
                    const refLink = window.location.origin + window.location.pathname + "?ref=" + address;
                    document.getElementById("refContainer").style.display = "block";
                    document.getElementById("refLinkDisplay").innerText = refLink;

                    document.getElementById("copyBtn").onclick = () => {
                        navigator.clipboard.writeText(refLink).then(() => {
                            document.getElementById("copyBtn").innerText = "Copied!";
                            setTimeout(() => { document.getElementById("copyBtn").innerText = "Copy Link"; }, 2000);
                        });
                    };

                    document.getElementById("copyTokenAddr").onclick = () => {
                        navigator.clipboard.writeText(tokenAddress).then(() => {
                            document.getElementById("copyTokenAddr").innerText = "Address Copied!";
                            setTimeout(() => { document.getElementById("copyTokenAddr").innerText = "Copy Address"; }, 2000);
                        });
                    };

                    contract = new ethers.Contract(saleAddress, abi, signer);
                } catch (err) {
                    document.getElementById("status").innerText = "Connection Failed!";
                }
            } else {
                alert("For Mobile users open in Wallet Browser");
            }
        }

        async function addToken() {
            try {
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: tokenAddress,
                            symbol: 'BNX',
                            decimals: 18,
                            image: 'https://binexa.xyz/images/logo.png',
                        },
                    },
                });
            } catch (error) { console.log(error); }
        }

        async function buy() {
            const amount = document.getElementById("bnbAmount").value;
            if (amount < 0.05) return alert("Minimum buy is 0.05 BNB");

            const urlParams = new URLSearchParams(window.location.search);
            let referrer = urlParams.get('ref') || "0x0000000000000000000000000000000000000000";

            try {
                document.getElementById("status").innerText = "Confirming in Wallet...";
                const tx = await contract.buyTokens(referrer, {
                    value: ethers.utils.parseEther(amount)
                });
                document.getElementById("status").innerText = "Transaction Sent...";
                await tx.wait();
                alert("Success! BNX Purchased.");
                document.getElementById("status").innerText = "Transaction Successful!";
            } catch (err) {
                alert("Transaction Failed! Ensure you have enough BNB.");
                document.getElementById("status").innerText = "Error!";
            }
        }

        document.getElementById("connectBtn").onclick = connect;
        document.getElementById("buyBtn").onclick = buy;
        document.getElementById("importBtn").onclick = addToken;
    </script>
</body>

</html>
